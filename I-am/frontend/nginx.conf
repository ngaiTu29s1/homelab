# Chỉ định server block của bạn ở đây.
# Không bao gồm 'events { ... }' và 'http { ... }' xung quanh nó.

server {
    listen 80;
    server_name 100.96.43.116; # Hoặc tên miền của bạn nếu có

    # Cấu hình để phục vụ các tệp tĩnh từ thư mục /usr/share/nginx/html
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Thử tìm file trước, nếu không có thì trả về index.html (cho SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy các yêu cầu đến /api đến Backend service
    location /api/ {
        proxy_pass http://backend:3000; # 'backend' là tên service trong docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
