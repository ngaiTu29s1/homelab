version: '3.8'

services:
  frontend:
    build:
      context: ./frontend # Chỉ định thư mục chứa Dockerfile của frontend
    ports:
      - "81:80" # Ánh xạ cổng 80 của host tới cổng 80 của container frontend
    depends_on:
      - backend # Đảm bảo backend khởi động trước frontend
    restart: always # Luôn khởi động lại nếu container dừng

  backend:
    build:
      context: ./backend # Chỉ định thư mục chứa Dockerfile của backend
    expose:
      - "3000" # Chỉ mở cổng 3000 bên trong mạng Docker, không ra ngoài host
    restart: always # Luôn khởi động lại nếu container dừng

# Bạn có thể định nghĩa một mạng tùy chỉnh nếu muốn kiểm soát nhiều hơn,
# nhưng với ví dụ đơn giản này, mạng mặc định của Docker Compose là đủ.
# Docker Compose sẽ tự tạo một mạng bridge nội bộ cho các service này.
